gldrtrvr:
  chat:
    api-kind: openai
    modelName: gemma-4-31b
    api-url: http://192.168.1.224:1234
    api-key: lm-studio
  embedding:
    chroma:
      database: prjxp-enriched

logging:
  level:
    # Standardmäßig alles auf WARN (versteckt Spring-Initialisierung)
    root: WARN
    org.springframework: WARN
    
    # Hier schaltest du gezielt deine eigenen Pakete auf INFO
    de.spraener.prjxp: INFO

  pattern:
    # Optional: Ein cleaneres Format für die Konsole (ohne Datum/Thread/Klasse)
    # So sieht es mehr nach einem CLI-Tool und weniger nach Server-Logs aus.
    console: "%clr(%msg){faint}%n"
