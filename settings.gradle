plugins {
    // Apply the foojay-resolver plugin to allow automatic download of JDKs
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.10.0'
}

rootProject.name = 'prjxp'
include('prjxp-common', 'chunk-norris', 'tibed', 'golden-retriever', 'oragel', 'mcp-server')
// Beispiel für mehrere Tools im encubator
['oragel'].each { name ->
    include name
    project(":$name").projectDir = new File(settingsDir, "encubator/$name")
}


include 'mcp-server'